<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SPPB Assessment | Tzu-Chi Foundation</title>
<style>
  :root{
    --navy:#003057;
    --navy-soft:#0a4170;
    --navy-tint:#eef3f7;
    --cyan:#00A6E6;
    --cyan-deep:#0089c2;
    --cyan-tint:#e6f6fd;
    --bg:#F6F8FA;
    --card:#FFFFFF;
    --ink:#1C2733;
    --slate:#445064;
    --slate-light:#7A8699;
    --line:#E3E8EE;
    --good:#1E8E5A;
    --good-tint:#E7F6EE;
    --fair:#C97A1A;
    --fair-tint:#FBF0E2;
    --poor:#C44545;
    --poor-tint:#FBEAEA;
    --radius:14px;
    --radius-sm:8px;
    --shadow: 0 1px 2px rgba(16,30,54,0.04), 0 6px 20px rgba(16,30,54,0.06);
    --shadow-lg: 0 10px 30px rgba(16,30,54,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3,h4{margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; letter-spacing:-0.01em;}
  p{margin:0;}
  button{font-family:inherit;}
  ::selection{background:var(--cyan-tint);}

  /* ---------- App shell ---------- */
  #app{display:none; min-height:100vh; flex-direction:column;}
  #app.active{display:flex;}

  .topbar{
    background:var(--navy);
    color:#fff;
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky; top:0; z-index:50;
    box-shadow:0 2px 12px rgba(0,0,0,0.18);
  }
  .topbar-left{display:flex; align-items:center; gap:10px; min-width:0;}
  .brand-logos{display:flex; align-items:center; gap:10px; flex-shrink:0; background:#fff; padding:6px 12px; border-radius:10px;}
  .brand-logos img{height:26px; display:block;}
  .brand-logos .divider{width:1px; height:22px; background:var(--line);}
  .topbar-title{font-size:14px; font-weight:700; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .topbar-sub{font-size:10.5px; color:rgba(255,255,255,0.6); font-weight:500; letter-spacing:.04em; text-transform:uppercase;}
  .topbar-right{display:flex; align-items:center; gap:8px; flex-shrink:0;}
  .icon-btn{
    width:36px;height:36px;border-radius:10px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.14);
    color:#fff; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:.15s;
  }
  .icon-btn:hover{background:rgba(255,255,255,0.18);}
  .icon-btn svg{width:18px;height:18px;}

  .nav-tabs{
    display:flex; gap:2px; background:var(--navy-soft);
    padding:0 8px; overflow-x:auto; scrollbar-width:none;
  }
  .nav-tabs::-webkit-scrollbar{display:none;}
  .nav-tab{
    padding:11px 14px 10px; font-size:12.5px; font-weight:600; color:rgba(255,255,255,0.55);
    border:none; background:none; cursor:pointer; white-space:nowrap;
    border-bottom:3px solid transparent; transition:.15s;
    display:flex; align-items:center; gap:6px;
  }
  .nav-tab .dot{width:6px;height:6px;border-radius:50%; background:rgba(255,255,255,0.3); flex-shrink:0;}
  .nav-tab.done .dot{background:var(--cyan);}
  .nav-tab.active{color:#fff; border-bottom-color:var(--cyan);}
  .nav-tab.locked{opacity:0.4; cursor:not-allowed;}

  main{flex:1; padding:18px 16px 100px; max-width:720px; margin:0 auto; width:100%;}

  .card{
    background:var(--card); border-radius:var(--radius);
    box-shadow:var(--shadow); border:1px solid var(--line);
    padding:20px; margin-bottom:16px;
  }
  .card-head{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:16px;}
  .card-eyebrow{font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--cyan-deep); margin-bottom:4px;}
  .card-title{font-size:18px; font-weight:800; color:var(--navy);}
  .card-desc{font-size:13px; color:var(--slate); margin-top:4px; line-height:1.5;}

  .badge{
    font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px;
    display:inline-flex; align-items:center; gap:5px; white-space:nowrap;
  }
  .badge-good{background:var(--good-tint); color:var(--good);}
  .badge-fair{background:var(--fair-tint); color:var(--fair);}
  .badge-poor{background:var(--poor-tint); color:var(--poor);}
  .badge-neutral{background:var(--navy-tint); color:var(--navy);}
  .badge-pending{background:#F0F1F3; color:var(--slate-light);}

  /* ---------- Form elements ---------- */
  label.field-label{display:block; font-size:12.5px; font-weight:700; color:var(--navy); margin-bottom:6px;}
  .field{margin-bottom:14px;}
  .field-hint{font-size:11.5px; color:var(--slate-light); margin-top:5px;}
  input[type=text], input[type=tel], input[type=date], input[type=number], select, textarea{
    width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid var(--line);
    font-size:15px; color:var(--ink); background:#fff; transition:.15s;
    font-family:inherit;
  }
  input:focus, select:focus, textarea:focus{
    outline:none; border-color:var(--cyan); box-shadow:0 0 0 3px var(--cyan-tint);
  }
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .row3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;}
  @media(max-width:480px){ .row3{grid-template-columns:1fr 1fr;} }

  .seg{display:flex; gap:8px; flex-wrap:wrap;}
  .seg-btn{
    flex:1; min-width:90px; padding:11px 12px; border-radius:10px; border:1.5px solid var(--line);
    background:#fff; color:var(--slate); font-size:13.5px; font-weight:700; cursor:pointer;
    transition:.15s; text-align:center;
  }
  .seg-btn.on{ border-color:var(--cyan); background:var(--cyan-tint); color:var(--cyan-deep); }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:13px 20px; border-radius:11px; font-size:14.5px; font-weight:700;
    border:none; cursor:pointer; transition:.15s; text-decoration:none;
  }
  .btn-primary{background:var(--cyan); color:#fff; box-shadow:0 4px 14px rgba(0,166,230,0.35);}
  .btn-primary:hover{background:var(--cyan-deep);}
  .btn-primary:disabled{background:#C8D3DE; box-shadow:none; cursor:not-allowed;}
  .btn-navy{background:var(--navy); color:#fff;}
  .btn-navy:hover{background:var(--navy-soft);}
  .btn-outline{background:#fff; color:var(--navy); border:1.5px solid var(--line);}
  .btn-outline:hover{border-color:var(--cyan); color:var(--cyan-deep);}
  .btn-ghost{background:none; color:var(--slate); padding:10px 14px;}
  .btn-block{width:100%;}
  .btn-sm{padding:9px 14px; font-size:13px;}
  .btn-danger{background:var(--poor-tint); color:var(--poor);}

  .actions-row{display:flex; gap:10px; margin-top:18px;}
  .actions-row .btn{flex:1;}

  /* ---------- Stepper / progress rail ---------- */
  .rail{display:flex; align-items:center; gap:0; margin-bottom:18px; padding:0 4px;}
  .rail-step{display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; position:relative;}
  .rail-circle{
    width:34px; height:34px; border-radius:50%; background:#fff; border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:var(--slate-light);
    z-index:2; transition:.2s;
  }
  .rail-step.done .rail-circle{background:var(--good); border-color:var(--good); color:#fff;}
  .rail-step.fair .rail-circle{background:var(--fair); border-color:var(--fair); color:#fff;}
  .rail-step.poor .rail-circle{background:var(--poor); border-color:var(--poor); color:#fff;}
  .rail-step.current .rail-circle{border-color:var(--cyan); color:var(--cyan-deep); box-shadow:0 0 0 4px var(--cyan-tint);}
  .rail-label{font-size:10.5px; font-weight:700; color:var(--slate-light); text-align:center;}
  .rail-step.current .rail-label{color:var(--navy);}
  .rail-line{position:absolute; top:17px; left:-50%; width:100%; height:2px; background:var(--line); z-index:1;}
  .rail-step:first-child .rail-line{display:none;}
  .rail-step.done .rail-line, .rail-step.fair .rail-line, .rail-step.poor .rail-line{background:var(--cyan);}

  /* ---------- Timer ---------- */
  .timer-wrap{display:flex; flex-direction:column; align-items:center; padding:22px 10px;}
  .timer-display{
    font-size:56px; font-weight:800; color:var(--navy); font-variant-numeric:tabular-nums;
    letter-spacing:-0.02em; line-height:1;
  }
  .timer-display.warn{color:var(--fair);}
  .timer-display.alert{color:var(--poor);}
  .timer-sub{font-size:12.5px; color:var(--slate-light); font-weight:600; margin-top:6px; text-transform:uppercase; letter-spacing:.05em;}
  .timer-controls{display:flex; gap:10px; margin-top:20px; width:100%;}
  .timer-controls .btn{flex:1;}
  .timer-ring{position:relative; width:200px; height:200px; margin:6px 0;}
  .timer-ring svg{transform:rotate(-90deg);}
  .timer-ring .ring-bg{fill:none; stroke:var(--navy-tint); stroke-width:10;}
  .timer-ring .ring-fg{fill:none; stroke:var(--cyan); stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset .25s linear, stroke .25s;}
  .timer-ring .ring-fg.warn{stroke:var(--fair);}
  .timer-ring .ring-fg.alert{stroke:var(--poor);}
  .timer-ring-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}

  .stand-counter{display:flex; align-items:center; gap:16px; justify-content:center; margin:18px 0;}
  .counter-btn{
    width:52px; height:52px; border-radius:50%; border:2px solid var(--line); background:#fff;
    font-size:24px; font-weight:800; color:var(--navy); display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:.15s;
  }
  .counter-btn:active{transform:scale(0.93); background:var(--cyan-tint); border-color:var(--cyan);}
  .counter-value{font-size:42px; font-weight:800; color:var(--navy); min-width:64px; text-align:center; font-variant-numeric:tabular-nums;}

  .info-box{
    background:var(--navy-tint); border-radius:10px; padding:13px 14px; font-size:12.5px;
    color:var(--navy-soft); line-height:1.55; margin-bottom:16px; border-left:3px solid var(--cyan);
  }
  .info-box.compact{padding:10px 12px; font-size:12px;}
  .info-box b{color:var(--navy);}
  .info-box ul{margin:6px 0 0; padding-left:18px;}
  .info-box li{margin-bottom:3px;}

  .rules-toggle{
    display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; color:var(--cyan-deep);
    cursor:pointer; padding:4px 0; margin-bottom:10px; user-select:none;
  }
  .rules-toggle svg{width:14px; height:14px; transition:.2s;}
  .rules-toggle.open svg{transform:rotate(180deg);}
  .rules-body{display:none;}
  .rules-body.open{display:block;}

  .side-block{border:1.5px solid var(--line); border-radius:12px; padding:16px; margin-bottom:12px;}
  .side-block-head{display:flex; align-items:center; justify-content:between; margin-bottom:10px;}
  .side-name{font-size:13px; font-weight:800; color:var(--navy); text-transform:uppercase; letter-spacing:.04em;}

  .result-pill{
    display:flex; align-items:center; justify-content:space-between;
    padding:13px 15px; border-radius:11px; margin-top:14px; font-size:14px; font-weight:700;
  }
  .result-pill.good{background:var(--good-tint); color:var(--good);}
  .result-pill.fair{background:var(--fair-tint); color:var(--fair);}
  .result-pill.poor{background:var(--poor-tint); color:var(--poor);}
  .result-pill .pill-val{font-size:20px; font-weight:800;}

  .check-row{
    display:flex; align-items:center; gap:10px; padding:12px 14px; border:1.5px solid var(--line);
    border-radius:10px; margin-bottom:8px; cursor:pointer; transition:.15s;
  }
  .check-row.on{border-color:var(--cyan); background:var(--cyan-tint);}
  .check-row input{width:18px; height:18px; accent-color:var(--cyan); flex-shrink:0;}
  .check-row .check-label{font-size:13.5px; font-weight:600; color:var(--ink);}
  .check-row .check-pts{font-size:11.5px; color:var(--poor); font-weight:700; margin-left:auto;}

  .radio-row{
    display:flex; align-items:flex-start; gap:10px; padding:12px 14px; border:1.5px solid var(--line);
    border-radius:10px; margin-bottom:8px; cursor:pointer; transition:.15s;
  }
  .radio-row.on{border-color:var(--cyan); background:var(--cyan-tint);}
  .radio-row input{width:18px; height:18px; accent-color:var(--cyan); margin-top:1px; flex-shrink:0;}
  .radio-row .radio-label{font-size:13.5px; font-weight:600; color:var(--ink); line-height:1.4;}

  textarea{min-height:70px; resize:vertical;}

  .lock-overlay{
    text-align:center; padding:40px 20px; color:var(--slate-light);
  }
  .lock-overlay svg{width:42px; height:42px; margin-bottom:12px; opacity:0.5;}
  .lock-overlay p{font-size:13.5px; font-weight:600; max-width:340px; margin:0 auto; line-height:1.6;}

  /* ---------- Login / setup ---------- */
  #gate{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    background: linear-gradient(160deg, var(--navy) 0%, #001E3C 100%);
  }
  .gate-card{
    background:#fff; border-radius:20px; padding:36px 28px; width:100%; max-width:380px;
    box-shadow:0 24px 60px rgba(0,0,0,0.35);
  }
  .gate-logos{display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:22px;}
  .gate-logos img{height:46px;}
  .gate-logos .divider{width:1px; height:34px; background:var(--line);}
  .gate-title{font-size:20px; font-weight:800; color:var(--navy); text-align:center; margin-bottom:4px;}
  .gate-sub{font-size:12.5px; color:var(--slate-light); text-align:center; margin-bottom:26px; line-height:1.5;}
  .gate-error{
    background:var(--poor-tint); color:var(--poor); font-size:12.5px; font-weight:600;
    padding:10px 12px; border-radius:8px; margin-top:12px; display:none;
  }
  .gate-link{display:block; text-align:center; font-size:12px; color:var(--slate-light); margin-top:18px; cursor:pointer; font-weight:600;}
  .gate-link:hover{color:var(--cyan-deep);}

  /* ---------- Toast ---------- */
  #toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--navy); color:#fff; padding:13px 22px; border-radius:12px; font-size:13.5px; font-weight:600;
    box-shadow:0 10px 30px rgba(0,0,0,0.25); z-index:200; opacity:0; transition:.25s; pointer-events:none;
    display:flex; align-items:center; gap:8px; max-width:90vw;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  #toast.error{background:var(--poor);}
  #toast.success{background:var(--good);}

  /* ---------- Bottom bar ---------- */
  .bottombar{
    position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line);
    padding:12px 16px; padding-bottom:max(12px, env(safe-area-inset-bottom));
    display:flex; gap:10px; z-index:60; box-shadow:0 -4px 20px rgba(0,0,0,0.06);
  }
  .bottombar .btn{flex:1;}

  /* ---------- Client list / records ---------- */
  .search-bar{
    display:flex; gap:10px; margin-bottom:14px;
  }
  .search-bar input{flex:1;}
  .record-row{
    display:flex; align-items:center; gap:12px; padding:14px; background:#fff; border:1px solid var(--line);
    border-radius:12px; margin-bottom:8px; cursor:pointer; transition:.15s;
  }
  .record-row:hover{border-color:var(--cyan); box-shadow:var(--shadow);}
  .record-avatar{
    width:42px; height:42px; border-radius:50%; background:var(--navy-tint); color:var(--navy);
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15px; flex-shrink:0;
  }
  .record-main{flex:1; min-width:0;}
  .record-name{font-size:14.5px; font-weight:700; color:var(--ink);}
  .record-meta{font-size:11.5px; color:var(--slate-light); margin-top:2px;}
  .record-score{text-align:right; flex-shrink:0;}
  .record-score .num{font-size:18px; font-weight:800; color:var(--navy);}
  .record-score .lbl{font-size:9.5px; color:var(--slate-light); text-transform:uppercase; font-weight:700;}

  .filter-chips{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; scrollbar-width:none;}
  .filter-chips::-webkit-scrollbar{display:none;}
  .chip{
    padding:7px 14px; border-radius:20px; background:#fff; border:1.5px solid var(--line); font-size:12.5px;
    font-weight:700; color:var(--slate); white-space:nowrap; cursor:pointer; flex-shrink:0;
  }
  .chip.on{background:var(--navy); border-color:var(--navy); color:#fff;}

  .empty-state{text-align:center; padding:50px 20px; color:var(--slate-light);}
  .empty-state svg{width:48px;height:48px; margin-bottom:14px; opacity:0.4;}
  .empty-state p{font-size:13.5px; font-weight:600;}

  .summary-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
  .summary-tile{background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px;}
  .summary-tile .tile-label{font-size:11px; font-weight:700; color:var(--slate-light); text-transform:uppercase; letter-spacing:.03em;}
  .summary-tile .tile-value{font-size:24px; font-weight:800; color:var(--navy); margin-top:4px;}
  .summary-tile .tile-sub{font-size:11px; color:var(--slate-light); margin-top:2px;}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,20,35,0.55); z-index:150; display:none;
    align-items:flex-end; justify-content:center; backdrop-filter:blur(2px);
  }
  .modal-overlay.show{display:flex;}
  .modal-sheet{
    background:#fff; border-radius:20px 20px 0 0; width:100%; max-width:480px; max-height:88vh; overflow-y:auto;
    padding:22px 20px 30px; animation:slideUp .25s ease-out;
  }
  @keyframes slideUp{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  @media(min-width:600px){
    .modal-overlay{align-items:center;}
    .modal-sheet{border-radius:20px; max-height:80vh;}
  }
  .modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
  .modal-title{font-size:17px; font-weight:800; color:var(--navy);}
  .modal-close{width:32px; height:32px; border-radius:50%; background:var(--navy-tint); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--navy);}

  table.export-table{width:100%; border-collapse:collapse; font-size:12.5px;}
  table.export-table th, table.export-table td{padding:8px 10px; border-bottom:1px solid var(--line); text-align:left;}

  .loading-spinner{
    width:18px; height:18px; border:2.5px solid rgba(255,255,255,0.3); border-top-color:#fff;
    border-radius:50%; animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .btn-primary .loading-spinner{border-color:rgba(255,255,255,0.3); border-top-color:#fff;}

  @media(max-width:380px){
    .timer-display{font-size:46px;}
    .timer-ring{width:170px; height:170px;}
  }
</style>
</head>
<body>

<!-- ===================== SETUP GATE (Supabase connection) ===================== -->
<div id="setupGate" style="display:none; min-height:100vh; align-items:center; justify-content:center; padding:24px; background:linear-gradient(160deg, #003057 0%, #001E3C 100%);">
  <div class="gate-card">
    <div class="gate-logos">
      <img id="setupLogo1" alt="Tzu-Chi Foundation">
      <div class="divider"></div>
      <img id="setupLogo2" alt="HUR">
    </div>
    <div class="gate-title">First-time setup</div>
    <div class="gate-sub">Connect this device to your Supabase project. You'll only need to do this once per device.</div>
    <div class="field">
      <label class="field-label">Supabase Project URL</label>
      <input type="text" id="setupUrl" placeholder="https://xxxxxxxx.supabase.co">
    </div>
    <div class="field">
      <label class="field-label">Supabase Anon Key</label>
      <input type="text" id="setupKey" placeholder="eyJhbGciOi...">
    </div>
    <div class="field">
      <label class="field-label">Set an admin password for this device</label>
      <input type="text" id="setupPassword" placeholder="Choose a password">
    </div>
    <button class="btn btn-primary btn-block" id="setupSaveBtn">Connect &amp; continue</button>
    <div class="gate-error" id="setupError"></div>
  </div>
</div>

<!-- ===================== LOGIN GATE (password only, after setup) ===================== -->
<div id="loginGate" style="display:none; min-height:100vh; align-items:center; justify-content:center; padding:24px; background:linear-gradient(160deg, #003057 0%, #001E3C 100%);">
  <div class="gate-card">
    <div class="gate-logos">
      <img id="loginLogo1" alt="Tzu-Chi Foundation">
      <div class="divider"></div>

/* ---------- Local storage keys ---------- */
const LS_URL = 'sppb_supabase_url';
const LS_KEY = 'sppb_supabase_key';
const LS_PASS = 'sppb_admin_password';
const LS_SESSION = 'sppb_session_active';

let supaUrl = localStorage.getItem(LS_URL) || '';
let supaKey = localStorage.getItem(LS_KEY) || '';

/* ---------- Minimal Supabase REST helper (no SDK dependency) ---------- */
const Supa = {
  async select(table, query=''){
    const res = await fetch(`${supaUrl}/rest/v1/${table}?${query}`, {
      headers: { 'apikey': supaKey, 'Authorization': `Bearer ${supaKey}` }
    });
    if(!res.ok) throw new Error(await res.text());
    return res.json();
  },
  async insert(table, body){
    const res = await fetch(`${supaUrl}/rest/v1/${table}`, {
      method:'POST',
      headers:{ 'apikey':supaKey, 'Authorization':`Bearer ${supaKey}`, 'Content-Type':'application/json', 'Prefer':'return=representation' },
      body: JSON.stringify(body)
    });
    if(!res.ok) throw new Error(await res.text());
    return res.json();
  },
  async update(table, query, body){
    const res = await fetch(`${supaUrl}/rest/v1/${table}?${query}`, {
      method:'PATCH',
      headers:{ 'apikey':supaKey, 'Authorization':`Bearer ${supaKey}`, 'Content-Type':'application/json', 'Prefer':'return=representation' },
      body: JSON.stringify(body)
    });
    if(!res.ok) throw new Error(await res.text());
    return res.json();
  },
  async delete(table, query){
    const res = await fetch(`${supaUrl}/rest/v1/${table}?${query}`, {
      method:'DELETE',
      headers:{ 'apikey':supaKey, 'Authorization':`Bearer ${supaKey}` }
    });
    if(!res.ok) throw new Error(await res.text());
    return true;
  }
};

/* ---------- Toast ---------- */
function toast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' '+type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.className='', 2600);
}

/* ---------- Gate logic ---------- */
function showGate(){
  const hasCreds = supaUrl && supaKey;
  const hasPass = localStorage.getItem(LS_PASS);
  document.getElementById('setupGate').style.display = 'none';
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('app').classList.remove('active');

  if(!hasCreds || !hasPass){
    document.getElementById('setupGate').style.display = 'flex';
  } else if(sessionStorage.getItem(LS_SESSION) === '1'){
    enterApp();
  } else {
    document.getElementById('loginGate').style.display = 'flex';
  }
}

document.getElementById('setupSaveBtn').addEventListener('click', ()=>{
  const url = document.getElementById('setupUrl').value.trim().replace(/\/$/,'');
  const key = document.getElementById('setupKey').value.trim();
  const pass = document.getElementById('setupPassword').value.trim();
  const err = document.getElementById('setupError');
  if(!url || !key || !pass){
    err.textContent = 'Please fill in all three fields.';
    err.style.display='block';
    return;
  }
  if(!url.startsWith('https://') || !url.includes('supabase.co')){
    err.textContent = 'That doesn\'t look like a Supabase URL. It should look like https://xxxx.supabase.co';
    err.style.display='block';
    return;
  }
  localStorage.setItem(LS_URL, url);
  localStorage.setItem(LS_KEY, key);
  localStorage.setItem(LS_PASS, pass);
  supaUrl = url; supaKey = key;
  sessionStorage.setItem(LS_SESSION,'1');
  err.style.display='none';
  enterApp();
});

document.getElementById('loginBtn').addEventListener('click', ()=>{
  const pass = document.getElementById('loginPassword').value.trim();
  const saved = localStorage.getItem(LS_PASS);
  const err = document.getElementById('loginError');
  if(pass === saved){
    sessionStorage.setItem(LS_SESSION,'1');
    err.style.display='none';
    enterApp();
  } else {
    err.textContent = 'Incorrect password. Please try again.';
    err.style.display='block';
  }
});
document.getElementById('loginPassword').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('loginBtn').click(); });

document.getElementById('resetSetupLink').addEventListener('click', ()=>{
  if(confirm('This will disconnect the current Supabase project from this device. You will need the URL and key again to reconnect. Continue?')){
    localStorage.removeItem(LS_URL);

});

/* ---------- Tab navigation ---------- */
document.getElementById('navTabs').addEventListener('click', (e)=>{
  const tab = e.target.closest('.nav-tab');
  if(!tab) return;
  const view = tab.dataset.view;
  if(tab.classList.contains('locked')){
    toast('Add client details first.');
    return;
  }
  navigateTo(view);
});

function navigateTo(view){
  state.view = view;
  document.querySelectorAll('.nav-tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.view===view);
  });
  updateTabStates();
  render();
  window.scrollTo(0,0);
}

function updateTabStates(){
  document.querySelectorAll('.nav-tab').forEach(t=>{
    const v = t.dataset.view;
    if(v==='clientlist'){ t.classList.remove('locked'); return; }
    const hasClient = !!state.client.name;
    t.classList.toggle('locked', !hasClient && v!=='info');
    if(v==='c1') t.classList.toggle('done', state.c1.completed);
    if(v==='c2') t.classList.toggle('done', state.c2.left.completed && state.c2.right.completed);
    if(v==='c3') t.classList.toggle('done', state.c3.optOut || state.c3.reps!==null);
    if(v==='grip') t.classList.toggle('done', state.grip.left1!==null && state.grip.right1!==null);
    if(v==='info') t.classList.toggle('done', !!state.client.name);
  });
}

function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function calcAge(dob){
  if(!dob) return null;
  const d = new Date(dob), now = new Date();
  let age = now.getFullYear() - d.getFullYear();
  const m = now.getMonth() - d.getMonth();
  if(m < 0 || (m===0 && now.getDate() < d.getDate())) age--;
  return age;
}
function initials(name){
  return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()).join('');
}
function fmtDate(d){
  if(!d) return '—';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-SG', {day:'numeric', month:'short', year:'numeric'});
}

function renderClientListBody(){
  const body = document.getElementById('clientListBody');
  if(!body) return;
  let list = state.clients;
  if(state.filterBatch !== 'all') list = list.filter(c=>c.batch===state.filterBatch);
  if(state.filterText.trim()){
    const q = state.filterText.trim().toLowerCase();
    list = list.filter(c => (c.name||'').toLowerCase().includes(q) || (c.mobile||'').includes(q));
  }
  if(list.length===0){
    body.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <p>No clients found. Start a new assessment to begin.</p>
    </div>`;
    return;
  }
  body.innerHTML = list.map(c=>{
    const stepsDone = computeOverallScore(c);
    return `<div class="record-row" data-id="${c.id}">
      <div class="record-avatar">${esc(initials(c.name))}</div>
      <div class="record-main">
        <div class="record-name">${esc(c.name)} <span style="color:var(--slate-light); font-weight:600;">· ${c.sex==='male'?'M':'F'}, ${calcAge(c.dob) ?? '—'}y</span></div>

      </div>
      <div class="record-score">
        <div class="num">${stepsDone}/4</div>
        <div class="lbl">${stepsDone===4 ? 'complete' : 'tests done'}</div>
      </div>
    </div>`;
  }).join('');
  body.querySelectorAll('.record-row').forEach(row=>{
    row.addEventListener('click', ()=> openClientRecord(row.dataset.id));
  });
}

function computeOverallScore(record){
  const stepsDone = [
    record.c1_completed,
    record.c2_left_completed && record.c2_right_completed,
    record.c3_opt_out || (record.c3_reps!==null && record.c3_reps!==undefined),
    (record.grip_left1!==null && record.grip_left1!==undefined) && (record.grip_right1!==null && record.grip_right1!==undefined)
  ].filter(Boolean).length;
  return stepsDone; // 0-4, rendered as "x/4 tests" in the list
}

async function openClientRecord(id){
  try{
    const rows = await Supa.select('sppb_assessments', `id=eq.${id}&select=*`);
    if(!rows.length){ toast('Record not found.', 'error'); return; }
    loadStateFromRecord(rows[0]);
    navigateTo('info');
  }catch(err){
    console.error(err);
    toast('Could not open record.', 'error');
  }
}

function loadStateFromRecord(r){
  state.recordId = r.id;
  state.client = { name:r.name, dob:r.dob, mobile:r.mobile, sex:r.sex, testDate:r.test_date, phase:r.phase, batch:r.batch||'' };
  state.c1 = { reps:r.c1_reps||0, completed:!!r.c1_completed, elapsed:r.c1_elapsed||0, remarks:r.c1_remarks||'' };
  state.c2 = {
    left:{seconds:r.c2_left_seconds||0, completed:!!r.c2_left_completed},
    right:{seconds:r.c2_right_seconds||0, completed:!!r.c2_right_completed},
    remarks:r.c2_remarks||''
  };
  state.c3 = {
    eligible: !!(r.c1_completed && r.c2_left_completed && r.c2_right_completed),
    optOut: !!r.c3_opt_out,
    optOutReasons: r.c3_opt_out_reasons || [],
    optOutOther: r.c3_opt_out_other || '',
    reps: r.c3_reps ?? null,
    deductions: r.c3_deductions || [],
    remarks: r.c3_remarks || ''
  };
  state.grip = {
    left1:r.grip_left1 ?? null, left2:r.grip_left2 ?? null, left3:r.grip_left3 ?? null,
    right1:r.grip_right1 ?? null, right2:r.grip_right2 ?? null, right3:r.grip_right3 ?? null,
    remarks:r.grip_remarks||''
  };
}

function resetAssessment(){
  state.recordId = null;
  state.client = { name:'', dob:'', mobile:'', sex:'male', testDate: new Date().toISOString().slice(0,10), phase:'pre', batch:'' };
  state.c1 = { reps:0, completed:false, elapsed:0, remarks:'' };
  state.c2 = { left:{seconds:0,completed:false}, right:{seconds:0,completed:false}, remarks:'' };
  state.c3 = { eligible:false, optOut:false, optOutReasons:[], optOutOther:'', reps:null, deductions:[], remarks:'' };
  state.grip = { left1:null,left2:null,left3:null, right1:null,right2:null,right3:null, remarks:'' };
}

/* ---------- Save current state to Supabase ---------- */
async function saveRecord(silent){
  const payload = {
    name: state.client.name,
    dob: state.client.dob || null,
    mobile: state.client.mobile,
    sex: state.client.sex,
    test_date: state.client.testDate,
    phase: state.client.phase,
    batch: state.client.batch,
    c1_reps: state.c1.reps,
    c1_completed: state.c1.completed,
    c1_elapsed: state.c1.elapsed,
    c1_remarks: state.c1.remarks,
    c2_left_seconds: state.c2.left.seconds,
    c2_left_completed: state.c2.left.completed,
    c2_right_seconds: state.c2.right.seconds,
    c2_right_completed: state.c2.right.completed,
    c2_remarks: state.c2.remarks,
    c3_opt_out: state.c3.optOut,
    c3_opt_out_reasons: state.c3.optOutReasons,
    c3_opt_out_other: state.c3.optOutOther,
    c3_reps: state.c3.reps,
    c3_deductions: state.c3.deductions,
    c3_remarks: state.c3.remarks,
    grip_left1: state.grip.left1, grip_left2: state.grip.left2, grip_left3: state.grip.left3,
    grip_right1: state.grip.right1, grip_right2: state.grip.right2, grip_right3: state.grip.right3,
    grip_remarks: state.grip.remarks
  };
  try{
    if(state.recordId){
      await Supa.update('sppb_assessments', `id=eq.${state.recordId}`, payload);
    } else {
      const rows = await Supa.insert('sppb_assessments', payload);
      state.recordId = rows[0].id;
    }
    if(!silent) toast('Saved.', 'success');
    return true;
  }catch(err){
    console.error(err);
    toast('Could not save — check your connection.', 'error');
    return false;
  }
}

/* ============================================================
   VIEW: C1 — 30-SECOND CHAIR STAND TEST
   ============================================================ */
let c1Timer = { running:false, remaining:30, intervalId:null, deadline:null, pausedRemaining:30 };

function viewC1(){
  const r = state.c1;
  const passed = r.completed && r.reps >= 14;
  return `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-eyebrow">Test C1</div>
          <div class="card-title">30-Second Chair Stand Test</div>
          <div class="card-desc">Pass criterion: <b>14 stands or more</b> in 30 seconds.</div>
        </div>
        ${r.completed ? `<span class="badge ${passed?'badge-good':'badge-poor'}">${passed?'Pass':'Below criterion'}</span>` : '<span class="badge badge-pending">Not started</span>'}
      </div>

      <div class="rules-toggle" id="c1RulesToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        Test instructions &amp; criteria
      </div>
      <div class="rules-body" id="c1RulesBody">
        <div class="info-box">
          <b>Setup:</b> Seat the client on a chair without armrests, seat height approximately 43cm, back against a wall if needed for stability.<br><br>
          <b>Instructions:</b> Arms crossed over chest. On "go", stand up fully and sit back down as many times as possible within 30 seconds. <b>No support from hands or arms is allowed.</b><br><br>
          <b>Scoring:</b> Count the total number of full stands completed in 30 seconds. A stand only counts if the client reaches full standing extension.<br><br>
          <b>Pass criterion:</b> ≥ 14 stands in 30 seconds.
        </div>
      </div>

      <div class="timer-ring">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <circle class="ring-bg" cx="100" cy="100" r="88"></circle>
          <circle class="ring-fg" id="c1RingFg" cx="100" cy="100" r="88" stroke-dasharray="553" stroke-dashoffset="0"></circle>
        </svg>
        <div class="timer-ring-center">
          <div class="timer-display" id="c1TimerDisplay">0:30</div>
          <div class="timer-sub">remaining</div>
        </div>
      </div>

      <div class="stand-counter">
        <button class="counter-btn" id="c1Minus">−</button>
        <div class="counter-value" id="c1CountVal">${r.reps}</div>
        <button class="counter-btn" id="c1Plus">+</button>
      </div>
      <div style="text-align:center; font-size:11.5px; color:var(--slate-light); font-weight:600; margin-top:-6px; margin-bottom:14px;">Tap + each time the client completes a full stand</div>

      <div class="timer-controls">
        <button class="btn btn-outline" id="c1ResetBtn">Reset</button>
        <button class="btn btn-primary" id="c1StartBtn">${c1Timer.running ? 'Pause' : 'Start 30s timer'}</button>
      </div>

      ${r.completed ? `<div class="result-pill ${passed?'good':'poor'}">
        <span>${r.reps} stands in 30 seconds</span>
        <span class="pill-val">${passed?'PASS':'FAIL'}</span>
      </div>` : ''}

      <div class="field" style="margin-top:18px;">
        <label class="field-label">Remarks</label>
        <textarea id="c1Remarks" placeholder="Any observations — balance, effort, hesitation, pain, etc.">${esc(r.remarks)}</textarea>
      </div>
    </div>

    <div class="actions-row">
      <button class="btn btn-outline" id="c1BackBtn">Back</button>
      <button class="btn btn-primary" id="c1SaveBtn">Save &amp; continue to C2</button>
    </div>
  `;
}

function afterRenderC1(){
  document.getElementById('c1RulesToggle').addEventListener('click', (e)=>{
    e.currentTarget.classList.toggle('open');
    document.getElementById('c1RulesBody').classList.toggle('open');
  });

  const countVal = document.getElementById('c1CountVal');
  document.getElementById('c1Plus').addEventListener('click', ()=>{
    state.c1.reps++; countVal.textContent = state.c1.reps;
  });
  document.getElementById('c1Minus').addEventListener('click', ()=>{
    state.c1.reps = Math.max(0, state.c1.reps-1); countVal.textContent = state.c1.reps;
  });

  document.getElementById('c1ResetBtn').addEventListener('click', ()=>{
    clearInterval(c1Timer.intervalId);
    c1Timer = { running:false, remaining:30, intervalId:null, deadline:null, pausedRemaining:30 };
    state.c1.completed = false;
    render();
  });

  document.getElementById('c1StartBtn').addEventListener('click', ()=>{
    if(c1Timer.running){
      // Pause: lock in remaining time
      clearInterval(c1Timer.intervalId);
      c1Timer.running = false;
      c1Timer.pausedRemaining = Math.max(0, c1Timer.remaining);
      document.getElementById('c1StartBtn').textContent = 'Resume';
      return;
    }
    // Start or resume: set an absolute deadline so drift in setInterval doesn't matter
    c1Timer.running = true;
    c1Timer.deadline = Date.now() + (c1Timer.pausedRemaining * 1000);
    document.getElementById('c1StartBtn').textContent = 'Pause';
    c1Timer.intervalId = setInterval(()=>{
      const msLeft = c1Timer.deadline - Date.now();
      c1Timer.remaining = Math.max(0, Math.ceil(msLeft / 1000));
      updateC1TimerDisplay();
      if(msLeft <= 0){
        clearInterval(c1Timer.intervalId);
        c1Timer.running = false;
        c1Timer.remaining = 0;
        state.c1.completed = true;
        state.c1.elapsed = 30;
        if(navigator.vibrate) navigator.vibrate(200);
        render();
      }
    }, 200);
  });

  document.getElementById('c1Remarks').addEventListener('input', e=> state.c1.remarks = e.target.value);

  document.getElementById('c1BackBtn').addEventListener('click', ()=> navigateTo('info'));
  document.getElementById('c1SaveBtn').addEventListener('click', async ()=>{
    const ok = await saveRecord();
    if(ok){ updateTabStates(); navigateTo('c2'); loadClientList(); }
  });
}

function updateC1TimerDisplay(){
  const disp = document.getElementById('c1TimerDisplay');
  const ring = document.getElementById('c1RingFg');
  if(!disp) return;
  const r = c1Timer.remaining;
  disp.textContent = `0:${r.toString().padStart(2,'0')}`;
  const pct = r/30;
  const circumference = 553;
  ring.setAttribute('stroke-dashoffset', circumference * (1-pct));
  disp.className = 'timer-display' + (r<=10 ? (r<=5?' alert':' warn') : '');
  ring.className = 'ring-fg' + (r<=10 ? (r<=5?' alert':' warn') : '');
}

/* ============================================================
   VIEW: C2 — 60-SECOND SINGLE LEG STANCE TEST
   ============================================================ */
let c2Timer = { side:null, running:false, elapsed:0, intervalId:null, startedAt:null };

function viewC2(){
  const r = state.c2;
  const leftPass = r.left.completed && r.left.seconds >= 10;
  const rightPass = r.right.completed && r.right.seconds >= 10;
  return `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-eyebrow">Test C2</div>
          <div class="card-title">60-Second Single Leg Stance Test</div>
          <div class="card-desc">Pass criterion: <b>≥ 10 seconds</b> on each leg.</div>
        </div>
      </div>

      <div class="rules-toggle" id="c2RulesToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        Test instructions &amp; criteria
      </div>
      <div class="rules-body" id="c2RulesBody">
        <div class="info-box">
          <b>Setup:</b> Client stands near a wall or chair for safety, but does not hold on during the timed attempt.<br><br>
          <b>Instructions:</b> Client lifts one foot off the ground and balances on the standing leg for up to 60 seconds. The timer stops the moment the lifted foot touches the ground, the standing foot shifts or moves substantially, or the client reaches out for support.<br><br>
          <b>Scoring:</b> Record the number of seconds balanced, up to a maximum of 60 seconds. Test both the left and right leg.<br><br>
          <b>Pass criterion:</b> ≥ 10 seconds per leg.
        </div>
      </div>
    </div>

    <div class="card">
      <div class="side-block" style="border-color:${r.left.completed ? (leftPass?'var(--good)':'var(--poor)') : 'var(--line)'};">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
          <span class="side-name">Left leg</span>
          ${r.left.completed ? `<span class="badge ${leftPass?'badge-good':'badge-poor'}">${leftPass?'Pass':'Below criterion'}</span>` : '<span class="badge badge-pending">Not started</span>'}
        </div>
        ${c2TimerBlock('left', r.left.seconds)}
      </div>

      <div class="side-block" style="border-color:${r.right.completed ? (rightPass?'var(--good)':'var(--poor)') : 'var(--line)'};">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
          <span class="side-name">Right leg</span>
          ${r.right.completed ? `<span class="badge ${rightPass?'badge-good':'badge-poor'}">${rightPass?'Pass':'Below criterion'}</span>` : '<span class="badge badge-pending">Not started</span>'}
        </div>
        ${c2TimerBlock('right', r.right.seconds)}
      </div>

      <div class="field" style="margin-top:6px;">
        <label class="field-label">Remarks</label>
        <textarea id="c2Remarks" placeholder="Any observations — sway, support sought, dominant leg, etc.">${esc(r.remarks)}</textarea>
      </div>
    </div>

    <div class="actions-row">
      <button class="btn btn-outline" id="c2BackBtn">Back</button>
      <button class="btn btn-primary" id="c2SaveBtn">Save &amp; continue to C3</button>
    </div>
  `;
}

function c2TimerBlock(side, seconds){
  return `
    <div style="display:flex; align-items:center; gap:16px;">
      <div style="font-size:34px; font-weight:800; color:var(--navy); font-variant-numeric:tabular-nums; min-width:80px;" id="c2Display_${side}">${seconds}s</div>
      <div style="flex:1; display:flex; gap:8px;">
        <button class="btn btn-outline btn-sm" id="c2Reset_${side}" style="flex:0;">Reset</button>
        <button class="btn btn-primary btn-sm" id="c2Start_${side}" style="flex:1;">Start</button>
      </div>
    </div>
  `;
}

function afterRenderC2(){
  document.getElementById('c2RulesToggle').addEventListener('click', (e)=>{
    e.currentTarget.classList.toggle('open');
    document.getElementById('c2RulesBody').classList.toggle('open');
  });

  ['left','right'].forEach(side=>{
    document.getElementById(`c2Reset_${side}`).addEventListener('click', ()=>{
      if(c2Timer.side===side){ clearInterval(c2Timer.intervalId); c2Timer = {side:null,running:false,elapsed:0,intervalId:null,startedAt:null}; }
      state.c2[side].seconds = 0;
      state.c2[side].completed = false;
      render();
    });
    document.getElementById(`c2Start_${side}`).addEventListener('click', ()=>{
      const btn = document.getElementById(`c2Start_${side}`);
      if(c2Timer.side===side && c2Timer.running){
        // Stop — record elapsed based on actual wall-clock time
        clearInterval(c2Timer.intervalId);
        const elapsedSec = Math.min(60, Math.floor((Date.now() - c2Timer.startedAt) / 1000));
        state.c2[side].seconds = elapsedSec;
        state.c2[side].completed = true;
        c2Timer = {side:null,running:false,elapsed:0,intervalId:null,startedAt:null};
        if(navigator.vibrate) navigator.vibrate(150);
        render();
        return;
      }
      // Start fresh for this side — anchor to a real start timestamp so setInterval drift doesn't matter
      c2Timer = {side, running:true, elapsed:0, intervalId:null, startedAt:Date.now()};
      btn.textContent = 'Stop';
      const disp = document.getElementById(`c2Display_${side}`);
      c2Timer.intervalId = setInterval(()=>{
        const elapsedSec = Math.floor((Date.now() - c2Timer.startedAt) / 1000);
        c2Timer.elapsed = elapsedSec;
        disp.textContent = `${Math.min(elapsedSec,60)}s`;
        if(elapsedSec >= 60){
          clearInterval(c2Timer.intervalId);
          state.c2[side].seconds = 60;
          state.c2[side].completed = true;
          c2Timer = {side:null,running:false,elapsed:0,intervalId:null,startedAt:null};
          if(navigator.vibrate) navigator.vibrate(200);
          render();
        }
      }, 200);
    });
  });

  document.getElementById('c2Remarks').addEventListener('input', e=> state.c2.remarks = e.target.value);
  document.getElementById('c2BackBtn').addEventListener('click', ()=> navigateTo('c1'));
  document.getElementById('c2SaveBtn').addEventListener('click', async ()=>{
    const ok = await saveRecord();
    if(ok){ updateTabStates(); navigateTo('c3'); loadClientList(); }
  });
}

/* ============================================================
   VIEW: C3 — SIT-TO-RISE TEST
   ============================================================ */
function c3IsEligible(){
  return state.c1.completed && state.c2.left.completed && state.c2.right.completed;
}

function viewC3(){
  const eligible = c3IsEligible();
  const c3 = state.c3;

  if(!eligible){
    return `
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-eyebrow">Test C3</div>
            <div class="card-title">Sit-to-Rise Test</div>
          </div>
        </div>
        <div class="lock-overlay">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <p>C3 is only available once the client has completed both <b>C1 (Chair Stand)</b> and <b>C2 (Single Leg Stance)</b>.</p>
        </div>
      </div>
      <div class="actions-row">
        <button class="btn btn-outline" id="c3BackBtn">Back to C2</button>
      </div>
    `;
  }

  const score = c3.reps !== null ? Math.max(0, c3.reps - c3DeductionTotal()) : null;
  const interp = score !== null ? sitRiseInterpret(score) : null;

  return `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-eyebrow">Test C3</div>
          <div class="card-title">Sit-to-Rise Test</div>
          <div class="card-desc">Score range 0–10. Interpretation: 0–3 poor · 3.5–7.5 fair · 8–10 good.</div>
        </div>
        ${c3.optOut ? '<span class="badge badge-neutral">Opted out</span>' : (score!==null ? `<span class="badge badge-${interp.cls}">${interp.label}</span>` : '<span class="badge badge-pending">Not started</span>')}
      </div>

      <div class="rules-toggle" id="c3RulesToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        Test instructions &amp; scoring
      </div>
      <div class="rules-body" id="c3RulesBody">
        <div class="info-box">
          <b>Instructions:</b> From a seated position on the floor, client rises to standing without using hands, knees, or any other support if possible.<br><br>
          <b>Scoring:</b> Start from a maximum of 10 points. Deduct 1 point for each point of support used (one hand, one knee, side of leg, etc.), up to a maximum deduction. In this app, deductions are tracked as <b>1 hand used (−1)</b> or <b>both hands used (−2)</b>.<br><br>
          <b>Interpretation:</b> 0–3 = Poor · 3.5–7.5 = Fair · 8–10 = Good.
        </div>
      </div>

      <label class="field-label">May the client opt out of C3?</label>
      <div class="check-row ${c3.optOut?'on':''}" id="c3OptOutToggle" style="margin-bottom:14px;">
        <input type="checkbox" id="c3OptOutCheck" ${c3.optOut?'checked':''}>
        <span class="check-label">Client cannot safely attempt this test</span>
      </div>

      ${c3.optOut ? c3OptOutBlock() : c3TestBlock(score, interp)}

      <div class="field" style="margin-top:6px;">
        <label class="field-label">Remarks</label>
        <textarea id="c3Remarks" placeholder="Any observations during the test.">${esc(c3.remarks)}</textarea>
      </div>
    </div>

    <div class="actions-row">
      <button class="btn btn-outline" id="c3BackBtn">Back</button>
      <button class="btn btn-primary" id="c3SaveBtn">Save &amp; continue to Grip</button>
    </div>
  `;
}

function c3DeductionTotal(){
  return state.c3.deductions.reduce((sum,id)=>{
    const d = SIT_RISE_DEDUCTIONS.find(x=>x.id===id);
    return sum + (d?d.points:0);
  }, 0);
}

function c3OptOutBlock(){
  const c3 = state.c3;
  return `
    <label class="field-label">Reason for opting out</label>
    ${OPT_OUT_REASONS.map(r=>`
      <div class="radio-row ${c3.optOutReasons.includes(r.id)?'on':''}" data-reason="${r.id}">
        <input type="checkbox" ${c3.optOutReasons.includes(r.id)?'checked':''}>
        <span class="radio-label">${r.label}</span>
      </div>
      ${r.id==='other' && c3.optOutReasons.includes('other') ? `<input type="text" id="c3OtherReason" placeholder="Please specify" value="${esc(c3.optOutOther)}" style="margin:-2px 0 10px;">` : ''}
    `).join('')}
  `;
}

function c3TestBlock(score, interp){
  const c3 = state.c3;
  return `
    <div class="field">
      <label class="field-label">Number of repetitions / attempt scored (0–10)</label>
      <input type="number" id="c3Reps" min="0" max="10" step="0.5" placeholder="e.g. 8" value="${c3.reps!==null?c3.reps:''}">
    </div>

    <label class="field-label">Support used (deductions)</label>
    ${SIT_RISE_DEDUCTIONS.map(d=>`
      <div class="check-row ${c3.deductions.includes(d.id)?'on':''}" data-deduction="${d.id}">
        <input type="checkbox" ${c3.deductions.includes(d.id)?'checked':''}>
        <span class="check-label">${d.label}</span>
        <span class="check-pts">−${d.points} pt${d.points>1?'s':''}</span>
      </div>
    `).join('')}

    <div id="c3ResultPill">${c3TestBlockResultHTML(score, interp)}</div>
  `;
}
function c3TestBlockResultHTML(score, interp){
  const c3 = state.c3;
  return score !== null ? `<div class="result-pill ${interp.cls}">
      <span>Final score: ${c3.reps} − ${c3DeductionTotal()} deduction</span>
      <span class="pill-val">${score} · ${interp.label}</span>
    </div>` : '';
}

function updateC3LiveResult(){
  const c3 = state.c3;
  const score = c3.reps !== null ? Math.max(0, c3.reps - c3DeductionTotal()) : null;
  const interp = score !== null ? sitRiseInterpret(score) : null;
  const pillEl = document.getElementById('c3ResultPill');
  if(pillEl) pillEl.innerHTML = c3TestBlockResultHTML(score, interp);
  // also refresh the header badge
  const headBadge = document.querySelector('.card-head .badge');
  if(headBadge && !c3.optOut){
    if(score!==null){
      headBadge.className = `badge badge-${interp.cls}`;
      headBadge.textContent = interp.label;
    } else {
      headBadge.className = 'badge badge-pending';
      headBadge.textContent = 'Not started';
    }
  }
}

function afterRenderC3(){
  const backBtn = document.getElementById('c3BackBtn');
  if(backBtn) backBtn.addEventListener('click', ()=> navigateTo('c2'));

  if(!c3IsEligible()) return;

  document.getElementById('c3RulesToggle').addEventListener('click', (e)=>{
    e.currentTarget.classList.toggle('open');
    document.getElementById('c3RulesBody').classList.toggle('open');
  });

  document.getElementById('c3OptOutToggle').addEventListener('click', ()=>{
    state.c3.optOut = !state.c3.optOut;
    if(!state.c3.optOut){ state.c3.optOutReasons=[]; state.c3.optOutOther=''; }
    else { state.c3.reps=null; state.c3.deductions=[]; }
    render();
  });

  document.querySelectorAll('[data-reason]').forEach(row=>{
    row.addEventListener('click', (e)=>{
      if(e.target.tagName==='INPUT' && e.target.type==='text') return;
      const id = row.dataset.reason;
      const idx = state.c3.optOutReasons.indexOf(id);
      if(idx>-1) state.c3.optOutReasons.splice(idx,1);
      else state.c3.optOutReasons.push(id);
      render();
    });
  });
  const otherInput = document.getElementById('c3OtherReason');
  if(otherInput) otherInput.addEventListener('input', e=> state.c3.optOutOther = e.target.value);

  const repsInput = document.getElementById('c3Reps');
  if(repsInput){
    repsInput.addEventListener('input', e=>{
      const v = e.target.value;
      state.c3.reps = v==='' ? null : parseFloat(v);
      updateC3LiveResult();
    });
  }

  document.querySelectorAll('[data-deduction]').forEach(row=>{
    row.addEventListener('click', ()=>{
      const id = row.dataset.deduction;
      const idx = state.c3.deductions.indexOf(id);
      if(idx>-1) state.c3.deductions.splice(idx,1);
      else state.c3.deductions.push(id);
      render();
    });
  });

  document.getElementById('c3Remarks').addEventListener('input', e=> state.c3.remarks = e.target.value);
  document.getElementById('c3SaveBtn').addEventListener('click', async ()=>{
    if(!state.c3.optOut && state.c3.reps===null){
      toast('Please enter a score, or mark the client as opted out.', 'error');
      return;
    }
    if(state.c3.optOut && state.c3.optOutReasons.length===0){
      toast('Please select a reason for opting out.', 'error');
      return;
    }
    const ok = await saveRecord();
    if(ok){ updateTabStates(); navigateTo('grip'); loadClientList(); }
  });
}

/* ============================================================
   VIEW: GRIP STRENGTH TEST (Jamar Hand Dynamometer)
   ============================================================ */
function viewGrip(){
  const g = state.grip;
  const age = calcAge(state.client.dob);
  const sex = state.client.sex;
  const threshold = age!==null ? gripThreshold(age, sex) : null;

  const leftBest = maxOf(g.left1,g.left2,g.left3);
  const rightBest = maxOf(g.right1,g.right2,g.right3);
  const leftPass = leftBest!==null && threshold!==null ? leftBest >= threshold : null;
  const rightPass = rightBest!==null && threshold!==null ? rightBest >= threshold : null;

  return `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-eyebrow">Grip Strength</div>
          <div class="card-title">Hand Grip Strength Test</div>
          <div class="card-desc">Jamar Hand Dynamometer · measured in kgf</div>
        </div>
      </div>

      <div class="rules-toggle" id="gripRulesToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        Test instructions
      </div>
      <div class="rules-body" id="gripRulesBody">
        <div class="info-box">
          This test is performed seated. Adjust the handle so the grip fits the participant's hand comfortably (usually female grip 2; male grip 3). Use the same setting for pre- and post-test.<br><br>
          Elbow flexed at 90°, shoulder in 10° abduction, wrist in neutral position. Ask the participant to take a breath and, while exhaling, squeeze the grip with maximum strength — exhalation during exertion is important.<br><br>
          Participant is <b>not</b> allowed to take support from the armrest of the chair or a table.<br><br>
          Perform <b>three times with the right hand and three times with the left hand</b>. Always start with the dominant hand.<br><br>
          Lower threshold values are based on smoothed data (Mahiowetz et al.) — 90% of the average value, with female values at 60% of male values.
        </div>
      </div>

      ${age!==null ? `<div class="info-box compact" style="margin-bottom:18px;">
        Auto-detected: <b>${age} years old, ${sex==='male'?'Male':'Female'}</b> → lower threshold <b>${threshold} kgf</b>
      </div>` : `<div class="info-box compact" style="margin-bottom:18px; border-left-color:var(--poor);">
        Date of birth missing — go back to Client Info to enable automatic threshold lookup.
      </div>`}

      <div class="side-block" id="gripLeftBlock" style="border-color:${leftPass===null?'var(--line)':(leftPass?'var(--good)':'var(--poor)')};">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
          <span class="side-name">Left hand</span>
          <span id="gripLeftBadge">${leftPass!==null ? `<span class="badge ${leftPass?'badge-good':'badge-poor'}">${leftPass?'Above threshold':'Below threshold'}</span>` : ''}</span>
        </div>
        <div class="row3">
          <div class="field"><label class="field-label">Trial 1</label><input type="number" step="0.1" min="0" id="gripL1" value="${g.left1??''}" placeholder="kgf"></div>
          <div class="field"><label class="field-label">Trial 2</label><input type="number" step="0.1" min="0" id="gripL2" value="${g.left2??''}" placeholder="kgf"></div>
          <div class="field"><label class="field-label">Trial 3</label><input type="number" step="0.1" min="0" id="gripL3" value="${g.left3??''}" placeholder="kgf"></div>
        </div>
        <div style="font-size:12.5px; color:var(--slate); font-weight:600;" id="gripLeftBest">${leftBest!==null ? `Best of 3: <b style="color:var(--navy);">${leftBest} kgf</b>` : ''}</div>
      </div>

      <div class="side-block" id="gripRightBlock" style="border-color:${rightPass===null?'var(--line)':(rightPass?'var(--good)':'var(--poor)')};">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
          <span class="side-name">Right hand</span>
          <span id="gripRightBadge">${rightPass!==null ? `<span class="badge ${rightPass?'badge-good':'badge-poor'}">${rightPass?'Above threshold':'Below threshold'}</span>` : ''}</span>
        </div>
        <div class="row3">
          <div class="field"><label class="field-label">Trial 1</label><input type="number" step="0.1" min="0" id="gripR1" value="${g.right1??''}" placeholder="kgf"></div>
          <div class="field"><label class="field-label">Trial 2</label><input type="number" step="0.1" min="0" id="gripR2" value="${g.right2??''}" placeholder="kgf"></div>
          <div class="field"><label class="field-label">Trial 3</label><input type="number" step="0.1" min="0" id="gripR3" value="${g.right3??''}" placeholder="kgf"></div>
        </div>
        <div style="font-size:12.5px; color:var(--slate); font-weight:600;" id="gripRightBest">${rightBest!==null ? `Best of 3: <b style="color:var(--navy);">${rightBest} kgf</b>` : ''}</div>
      </div>

      <div class="field" style="margin-top:6px;">
        <label class="field-label">Remarks</label>
        <textarea id="gripRemarks" placeholder="Any observations — pain, grip fit, dominant hand, etc.">${esc(g.remarks)}</textarea>
      </div>
    </div>

    <div class="actions-row">
      <button class="btn btn-outline" id="gripBackBtn">Back</button>
      <button class="btn btn-primary" id="gripSaveBtn">Save &amp; view summary</button>
    </div>
  `;
}

function maxOf(...vals){
  const nums = vals.filter(v=>v!==null && v!==undefined && v!=='' && !isNaN(v)).map(Number);
  return nums.length ? Math.max(...nums) : null;
}

function afterRenderGrip(){
  document.getElementById('gripRulesToggle').addEventListener('click', (e)=>{
    e.currentTarget.classList.toggle('open');
    document.getElementById('gripRulesBody').classList.toggle('open');
  });

  [['gripL1','left1'],['gripL2','left2'],['gripL3','left3'],['gripR1','right1'],['gripR2','right2'],['gripR3','right3']].forEach(([id,key])=>{
    document.getElementById(id).addEventListener('input', e=>{
      const v = e.target.value;
      state.grip[key] = v==='' ? null : parseFloat(v);
      updateGripLiveResults();
    });
  });

  document.getElementById('gripRemarks').addEventListener('input', e=> state.grip.remarks = e.target.value);
  document.getElementById('gripBackBtn').addEventListener('click', ()=> navigateTo('c3'));
  document.getElementById('gripSaveBtn').addEventListener('click', async ()=>{
    const ok = await saveRecord();
    if(ok){ updateTabStates(); navigateTo('summary'); loadClientList(); }
  });
}

/* Update only the derived bits (best-of-3, pass badges) without re-rendering inputs,
   so in-progress typing in other fields is never disturbed. */
function updateGripLiveResults(){
  const age = calcAge(state.client.dob);
  const sex = state.client.sex;
  const threshold = age!==null ? gripThreshold(age, sex) : null;
  const g = state.grip;

  const leftBest = maxOf(g.left1,g.left2,g.left3);
  const rightBest = maxOf(g.right1,g.right2,g.right3);
  const leftPass = leftBest!==null && threshold!==null ? leftBest >= threshold : null;
  const rightPass = rightBest!==null && threshold!==null ? rightBest >= threshold : null;

  const leftBlock = document.getElementById('gripLeftBlock');
  const rightBlock = document.getElementById('gripRightBlock');
  if(leftBlock){
    leftBlock.style.borderColor = leftPass===null ? 'var(--line)' : (leftPass?'var(--good)':'var(--poor)');
    document.getElementById('gripLeftBadge').innerHTML = leftPass!==null ? `<span class="badge ${leftPass?'badge-good':'badge-poor'}">${leftPass?'Above threshold':'Below threshold'}</span>` : '';
    document.getElementById('gripLeftBest').innerHTML = leftBest!==null ? `Best of 3: <b style="color:var(--navy);">${leftBest} kgf</b>` : '';
  }
  if(rightBlock){
    rightBlock.style.borderColor = rightPass===null ? 'var(--line)' : (rightPass?'var(--good)':'var(--poor)');
    document.getElementById('gripRightBadge').innerHTML = rightPass!==null ? `<span class="badge ${rightPass?'badge-good':'badge-poor'}">${rightPass?'Above threshold':'Below threshold'}</span>` : '';
    document.getElementById('gripRightBest').innerHTML = rightBest!==null ? `Best of 3: <b style="color:var(--navy);">${rightBest} kgf</b>` : '';
  }
}

/* ============================================================
   VIEW: SUMMARY
   ============================================================ */
function viewSummary(){
  const c = state.client;
  const age = calcAge(c.dob);
  const c1Pass = state.c1.completed && state.c1.reps>=14;
  const c2lPass = state.c2.left.completed && state.c2.left.seconds>=10;
  const c2rPass = state.c2.right.completed && state.c2.right.seconds>=10;
  const c3Score = !state.c3.optOut && state.c3.reps!==null ? Math.max(0, state.c3.reps - c3DeductionTotal()) : null;
  const c3Interp = c3Score!==null ? sitRiseInterpret(c3Score) : null;
  const threshold = age!==null ? gripThreshold(age, c.sex) : null;
  const leftBest = maxOf(state.grip.left1,state.grip.left2,state.grip.left3);
  const rightBest = maxOf(state.grip.right1,state.grip.right2,state.grip.right3);
  const gripLPass = leftBest!==null && threshold!==null ? leftBest>=threshold : null;
  const gripRPass = rightBest!==null && threshold!==null ? rightBest>=threshold : null;

  return `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-eyebrow">${c.phase==='pre'?'Pre-assessment':'Post-assessment'} Summary</div>
          <div class="card-title" style="font-size:20px;">${esc(c.name)}</div>
          <div class="card-desc">${c.sex==='male'?'Male':'Female'} · ${age??'—'} years old · Tested ${fmtDate(c.testDate)}${c.batch?' · '+esc(c.batch):''}</div>
        </div>
      </div>

      <div class="summary-grid">
        <div class="summary-tile">
          <div class="tile-label">C1 · Chair Stand</div>
          <div class="tile-value">${state.c1.completed ? state.c1.reps : '—'}</div>
          <div class="tile-sub">${state.c1.completed ? (c1Pass?'✓ Pass (≥14)':'Below criterion') : 'Not completed'}</div>
        </div>
        <div class="summary-tile">
          <div class="tile-label">C2 · Balance (L / R)</div>
          <div class="tile-value">${state.c2.left.completed?state.c2.left.seconds:'—'} / ${state.c2.right.completed?state.c2.right.seconds:'—'}</div>
          <div class="tile-sub">${state.c2.left.completed && state.c2.right.completed ? ((c2lPass&&c2rPass)?'✓ Both ≥10s':'Below criterion') : 'Not completed'}</div>
        </div>
        <div class="summary-tile">
          <div class="tile-label">C3 · Sit-to-Rise</div>
          <div class="tile-value">${state.c3.optOut ? 'Opt-out' : (c3Score!==null?c3Score:'—')}</div>
          <div class="tile-sub">${state.c3.optOut ? 'Client opted out' : (c3Interp ? c3Interp.label : 'Not completed')}</div>
        </div>
        <div class="summary-tile">
          <div class="tile-label">Grip (L / R kgf)</div>
          <div class="tile-value">${leftBest??'—'} / ${rightBest??'—'}</div>
          <div class="tile-sub">${threshold ? 'Threshold '+threshold+' kgf' : '—'}</div>
        </div>
      </div>

      <div class="card" style="margin:0 0 12px; box-shadow:none; border:1px solid var(--line); padding:14px 16px;">
        <div style="font-size:12.5px; font-weight:800; color:var(--navy); margin-bottom:8px;">Result breakdown</div>
        ${summaryRow('C1 — 30s Chair Stand', state.c1.completed ? `${state.c1.reps} stands` : 'Not done', state.c1.completed ? (c1Pass?'good':'poor') : 'neutral')}
        ${summaryRow('C2 — Left leg balance', state.c2.left.completed ? `${state.c2.left.seconds}s` : 'Not done', state.c2.left.completed ? (c2lPass?'good':'poor') : 'neutral')}
        ${summaryRow('C2 — Right leg balance', state.c2.right.completed ? `${state.c2.right.seconds}s` : 'Not done', state.c2.right.completed ? (c2rPass?'good':'poor') : 'neutral')}
        ${summaryRow('C3 — Sit-to-Rise', state.c3.optOut ? c3OptOutSummaryText() : (c3Score!==null ? `${c3Score} / 10 · ${c3Interp.label}` : 'Not done'), state.c3.optOut ? 'neutral' : (c3Interp?c3Interp.cls:'neutral'))}
        ${summaryRow('Grip — Left hand', leftBest!==null ? `${leftBest} kgf` : 'Not done', gripLPass===null?'neutral':(gripLPass?'good':'poor'))}
        ${summaryRow('Grip — Right hand', rightBest!==null ? `${rightBest} kgf` : 'Not done', gripRPass===null?'neutral':(gripRPass?'good':'poor'))}
      </div>

      ${allRemarks() ? `<div class="info-box"><b>Remarks logged:</b><br>${allRemarks()}</div>` : ''}
    </div>

    <div class="actions-row">
      <button class="btn btn-outline" id="summaryEditBtn">Edit assessment</button>
      <button class="btn btn-navy" id="summaryExportBtn">Export this record</button>
    </div>
    <div class="actions-row">
      <button class="btn btn-primary btn-block" id="summaryDoneBtn">Done — back to client list</button>
    </div>
  `;
}

function c3OptOutSummaryText(){
  const reasons = state.c3.optOutReasons.map(id=>{
    if(id==='other') return state.c3.optOutOther || 'Other';
    return OPT_OUT_REASONS.find(r=>r.id===id)?.label;
  }).filter(Boolean);
  return reasons.join('; ') || 'Opted out';
}

function summaryRow(label, value, cls){
  const dotColor = {good:'var(--good)', fair:'var(--fair)', poor:'var(--poor)', neutral:'var(--slate-light)'}[cls];
  return `<div style="display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px;">
    <span style="display:flex; align-items:center; gap:8px; color:var(--slate);"><span style="width:7px;height:7px;border-radius:50%; background:${dotColor}; flex-shrink:0;"></span>${label}</span>
    <span style="font-weight:700; color:var(--ink);">${esc(String(value))}</span>
  </div>`;
}

function allRemarks(){
  const parts = [];
  if(state.c1.remarks) parts.push(`<b>C1:</b> ${esc(state.c1.remarks)}`);
  if(state.c2.remarks) parts.push(`<b>C2:</b> ${esc(state.c2.remarks)}`);
  if(state.c3.remarks) parts.push(`<b>C3:</b> ${esc(state.c3.remarks)}`);
  if(state.grip.remarks) parts.push(`<b>Grip:</b> ${esc(state.grip.remarks)}`);
  return parts.join('<br>');
}

function afterRenderSummary(){
  document.getElementById('summaryEditBtn').addEventListener('click', ()=> navigateTo('info'));
  document.getElementById('summaryExportBtn').addEventListener('click', ()=> openExportModal('single'));
  document.getElementById('summaryDoneBtn').addEventListener('click', ()=>{
    navigateTo('clientlist');
    loadClientList();
  });
}

/* ============================================================
   EXPORT
   ============================================================ */
function openExportModal(defaultMode){
  const overlay = document.getElementById('modalOverlay');
  const sheet = document.getElementById('modalSheet');
  const batches = [...new Set(state.clients.map(c=>c.batch).filter(Boolean))];

  sheet.innerHTML = `
    <div class="modal-head">
      <div class="modal-title">Export records</div>
      <button class="modal-close" id="modalCloseBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <label class="field-label">What would you like to export?</label>
    <div class="seg" style="margin-bottom:16px;">
      <button class="seg-btn ${defaultMode==='single'?'on':''}" data-mode="single" type="button">This client</button>
      <button class="seg-btn ${defaultMode==='range'?'on':''}" data-mode="range" type="button">Date range</button>
      <button class="seg-btn ${defaultMode==='batch'?'on':''}" data-mode="batch" type="button">By batch</button>
    </div>

    <div id="exportOptions"></div>

    <button class="btn btn-primary btn-block" id="exportDownloadBtn" style="margin-top:8px;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download CSV
    </button>
  `;

  let mode = defaultMode;
  function renderOptions(){
    const opts = document.getElementById('exportOptions');
    if(mode==='single'){
      opts.innerHTML = `<div class="info-box compact">Exports the full record for <b>${esc(state.client.name||'this client')}</b> currently open.</div>`;
    } else if(mode==='range'){
      const today = new Date().toISOString().slice(0,10);
      opts.innerHTML = `
        <div class="row2">
          <div class="field"><label class="field-label">From</label><input type="date" id="exportFrom" value="${today}"></div>
          <div class="field"><label class="field-label">To</label><input type="date" id="exportTo" value="${today}"></div>
        </div>`;
    } else if(mode==='batch'){
      opts.innerHTML = `
        <div class="field">
          <label class="field-label">Select batch</label>
          <select id="exportBatch">
            ${batches.length ? batches.map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join('') : '<option value="">No batches found</option>'}
          </select>
        </div>`;
    }
  }
  renderOptions();

  sheet.querySelectorAll('[data-mode]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      mode = btn.dataset.mode;
      sheet.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('on', b.dataset.mode===mode));
      renderOptions();
    });
  });

  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });

  document.getElementById('exportDownloadBtn').addEventListener('click', async ()=>{
    let records = [];
    if(mode==='single'){
      records = state.recordId ? state.clients.filter(c=>c.id===state.recordId) : [];
      if(records.length===0 && state.client.name) records = [currentStateAsRecord()];
    } else if(mode==='range'){
      const from = document.getElementById('exportFrom').value;
      const to = document.getElementById('exportTo').value;
      records = state.clients.filter(c => c.test_date >= from && c.test_date <= to);
    } else if(mode==='batch'){
      const b = document.getElementById('exportBatch').value;
      records = state.clients.filter(c => c.batch === b);
    }
    if(records.length===0){ toast('No records found for that selection.', 'error'); return; }
    downloadCSV(records);
    closeModal();
  });

  overlay.classList.add('show');
}

function currentStateAsRecord(){
  return {
    name: state.client.name, dob: state.client.dob, mobile: state.client.mobile, sex: state.client.sex,
    test_date: state.client.testDate, phase: state.client.phase, batch: state.client.batch,
    c1_reps: state.c1.reps, c1_completed: state.c1.completed,
    c2_left_seconds: state.c2.left.seconds, c2_left_completed: state.c2.left.completed,
    c2_right_seconds: state.c2.right.seconds, c2_right_completed: state.c2.right.completed,
    c3_opt_out: state.c3.optOut, c3_reps: state.c3.reps, c3_deductions: state.c3.deductions,
    grip_left1: state.grip.left1, grip_left2: state.grip.left2, grip_left3: state.grip.left3,
    grip_right1: state.grip.right1, grip_right2: state.grip.right2, grip_right3: state.grip.right3
  };
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
}

function downloadCSV(records){
  const headers = ['Name','DOB','Age','Sex','Mobile','Test Date','Phase','Batch',
    'C1 Stands','C1 Pass','C2 Left (s)','C2 Right (s)','C2 Pass',
    'C3 Opt-Out','C3 Score','C3 Interpretation',
    'Grip Left Best (kgf)','Grip Right Best (kgf)','Grip Threshold','Grip Pass'];
  const rows = records.map(r=>{
    const age = calcAge(r.dob);
    const threshold = age!==null ? gripThreshold(age, r.sex) : '';
    const leftBest = maxOf(r.grip_left1,r.grip_left2,r.grip_left3);
    const rightBest = maxOf(r.grip_right1,r.grip_right2,r.grip_right3);
    const c3score = (!r.c3_opt_out && r.c3_reps!==null && r.c3_reps!==undefined) ? Math.max(0, r.c3_reps - (r.c3_deductions||[]).reduce((s,id)=>s+(SIT_RISE_DEDUCTIONS.find(x=>x.id===id)?.points||0),0)) : '';
    const c3interp = c3score!=='' ? sitRiseInterpret(c3score).label : '';
    const gripPass = (leftBest!==null && rightBest!==null && threshold!=='') ? ((leftBest>=threshold && rightBest>=threshold)?'Yes':'No') : '';
    return [
      r.name, r.dob, age??'', r.sex, r.mobile, r.test_date, r.phase, r.batch||'',
      r.c1_reps??'', r.c1_completed ? (r.c1_reps>=14?'Yes':'No') : '',
      r.c2_left_seconds??'', r.c2_right_seconds??'',
      (r.c2_left_completed && r.c2_right_completed) ? ((r.c2_left_seconds>=10 && r.c2_right_seconds>=10)?'Yes':'No') : '',
      r.c3_opt_out ? 'Yes':'No', c3score, c3interp,
      leftBest??'', rightBest??'', threshold, gripPass
    ];
  });
  const csv = [headers, ...rows].map(row =>
    row.map(cell => {
      const s = String(cell ?? '');
      return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
    }).join(',')
  ).join('\n');

  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `SPPB_export_${stamp}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('CSV downloaded.', 'success');
}
</script>
</body>
